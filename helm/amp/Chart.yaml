apiVersion: v2
name: amp
description: |
  Alertmanager++ (AMP) - Alertmanager-inspired runtime with a real publishing
  path, controlled replacement slice, and phased compatibility work.

type: application
version: 0.1.0
appVersion: "0.0.1"

home: https://github.com/ipiton/AMP
sources:
  - https://github.com/ipiton/AMP

maintainers:
  - name: AMP Team
    url: https://github.com/ipiton/AMP

keywords:
  - alertmanager
  - alertmanager-plus-plus
  - amp
  - monitoring
  - llm
  - ai
  - classification
  - kubernetes
  - prometheus
  - webhook
  - alerting

annotations:
  category: Monitoring
  license: AGPL-3.0
  artifacthub.io/changes: |
    - Initial OSS release
    - Controlled replacement slice for active runtime
    - LLM classification (BYOK - Bring Your Own Key)
    - Real publishing path with phased wider parity
    - Web dashboard surface included (partial)

dependencies:
  - name: valkey
    version: "2.1.3"
    repository: "https://groundhog2k.github.io/helm-charts"
    condition: cache.enabled
    tags:
      - cache
