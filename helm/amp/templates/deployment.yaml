apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "amp.fullname" . }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "amp.labels" . | nindent 4 }}
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "amp.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.strategy.maxUnavailable | default "25%" }}
      maxSurge: {{ .Values.strategy.maxSurge | default "25%" }}
  template:
    metadata:
      labels:
        {{- include "amp.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "amp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds | default 30 }}
      containers:
        - name: amp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort | default 9090 }}
              protocol: TCP
          env:
            # Application Configuration
            - name: SERVICE_NAME
              value: {{ include "amp.fullname" . }}
            - name: SERVICE_VERSION
              value: {{ .Chart.AppVersion | quote }}

            # Database Configuration
            {{- if and .Values.postgresql.enabled (eq .Values.profile "standard") }}
            - name: DATABASE_HOST
              value: {{ include "amp.postgresql.fullname" . }}
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_DATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: DATABASE_USERNAME
              value: {{ .Values.postgresql.username | quote }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "amp.postgresql.secretName" . }}
                  key: password
            - name: DATABASE_SSL_MODE
              value: {{ ternary "require" "disable" (eq (default "off" .Values.postgresql.config.ssl) "on") | quote }}
            {{- else }}
            - name: STORAGE_FILESYSTEM_PATH
              value: {{ printf "%s/alerthistory.db" .Values.liteProfile.persistence.mountPath | quote }}
            {{- end }}

            # Valkey/Redis Configuration (Standard Profile Only)
            {{- if and .Values.cache.enabled (eq .Values.profile "standard") }}
            - name: REDIS_ADDR
              value: {{ printf "%s:%v" (tpl .Values.cache.host .) .Values.cache.port | quote }}
            {{- if .Values.cache.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "amp.fullname" . }}-secrets
                  key: redis-password
            {{- end }}
            {{- else }}
            - name: REDIS_ADDR
              value: "localhost:6379"
            {{- end }}

            # LLM Configuration
            {{- if .Values.llm.enabled }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "amp.fullname" . }}-secrets
                  key: llm-api-key
            {{- end }}

            # Publishing Configuration
            {{- if .Values.publishing.discovery.namespace }}
            - name: PUBLISHING_DISCOVERY_NAMESPACE
              value: {{ .Values.publishing.discovery.namespace | quote }}
            {{- else }}
            - name: PUBLISHING_DISCOVERY_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            {{- end }}

            # Server Configuration
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            {{- if .Values.server.externalUrl }}
            - name: SERVER_EXTERNAL_URL
              value: {{ .Values.server.externalUrl | quote }}
            {{- end }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}

          envFrom:
            - configMapRef:
                name: {{ include "amp.fullname" . }}-config
                optional: true

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path | default "/healthz" }}
              port: http
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds | default 30 }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 3 }}
            successThreshold: 1

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path | default "/readyz" }}
              port: http
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds | default 5 }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 10 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 3 }}
            successThreshold: 1

          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path | default "/healthz" }}
              port: http
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 10 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 30 }}
            successThreshold: 1

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # Graceful shutdown: rely on SIGTERM handling in application
          # No preStop hook needed - our app handles SIGTERM properly

          {{- if eq .Values.profile "lite" }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.liteProfile.persistence.mountPath }}
          {{- end }}

      {{- if eq .Values.profile "lite" }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "amp.fullname" . }}-pvc
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
