# Rootly-specific secrets template
{{- if .Values.rootly.enabled -}}
{{- $rootlyHeaders := dict -}}
{{- if .Values.rootly.orgId }}
{{- $_ := set $rootlyHeaders "X-Rootly-Org-ID" .Values.rootly.orgId -}}
{{- end }}
{{- $rootlyTarget := dict
  "name" "rootly-production"
  "type" "rootly"
  "format" "rootly"
  "url" .Values.rootly.webhookUrl
  "enabled" .Values.rootly.enabled
  "headers" $rootlyHeaders
  "filterConfig" (default (dict) .Values.rootly.filterConfig)
  "secret" (dict
    "apiKey" .Values.rootly.apiKey
    "token" .Values.rootly.authToken
    "customHeaders" (default (dict) .Values.rootly.customHeaders)
  )
-}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "amp.fullname" . }}-rootly-target
  namespace: {{ .Values.namespace | default .Release.Namespace }}
  labels:
    {{- include "amp.labels" . | nindent 4 }}
    app.kubernetes.io/component: publishing-target
    publishing-target: "true"
  annotations:
    description: "Rootly incident management integration"
type: Opaque
data:
  config: {{ include "amp.publishingTargetConfigB64" (dict "target" $rootlyTarget) | quote }}
{{- end }}
