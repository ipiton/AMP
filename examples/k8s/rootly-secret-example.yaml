---
# Example Kubernetes Secret for Rootly Publishing Target
# This example uses the canonical publishing target Secret contract for AMP.
#
# Usage:
#   1. Replace the placeholder API key in the JSON payload below
#   2. Adjust the namespace if your runtime is not deployed in `monitoring`
#   3. Apply: kubectl apply -f rootly-secret-example.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: rootly-prod
  namespace: monitoring
  labels:
    publishing-target: "true"
    target-type: "rootly"
  annotations:
    description: "Rootly incident management integration"
type: Opaque
stringData:
  config: |
    {
      "name": "rootly-prod",
      "type": "rootly",
      "url": "https://api.rootly.com/v1/incidents",
      "enabled": true,
      "format": "rootly",
      "headers": {
        "Authorization": "Bearer YOUR_ROOTLY_API_KEY"
      },
      "filter_config": {
        "severity": ["critical", "warning"],
        "namespaces": ["production"]
      }
    }

# For additional environments (staging, dev), create separate files:
# - rootly-staging-secret.yaml
# - rootly-dev-secret.yaml
